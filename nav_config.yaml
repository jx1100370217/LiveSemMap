# ---- 语义标注 (L40 vLLM) ----
semantic_api: http://192.168.50.72:8299/v1   # 置空 "" 关闭语义标注
semantic_model: qwen3.5-35b-a3b
semantic_thin: 0.4   # 空间抽稀: 距上一提交关键帧 VIO 位移<该值(米)不标注; 0=全标;
                     # 仅配置了 vio 时生效 (纯 RGB 无米制位置, 自动全标)

# ---- 导航 Web ----
web_port: 8080
