# ============================================================
# 语义建图 + 导航 统一运行配置
# 只需改这一个文件, 然后依次零参数执行:
#   python main.py                 # 增量语义建图 (Ctrl-C 可随时中断保存)
#   python nav_web/export_web.py   # 导出导航 Web 数据
#   python nav_web/server.py       # 启动可视化导航 (浏览器打开 http://localhost:<web_port>)
# 命令行参数仍可用且优先于本文件。
# ============================================================

# ---- 数据集: cfds_floor28 创富大厦28楼 ----
dataset: datasets/cfds_floor28
config: config/cfds_floor28.yaml
calib: ""                           # 新 insight9 数据无相机内参 -> 无标定模式
vio: datasets/cfds_floor28/vio.txt  # VIO 度量轨迹; 纯 RGB 数据集置空 ""
# vio: ""
save_as: cfds_floor28_run           # 产物目录 logs/<save_as>/

